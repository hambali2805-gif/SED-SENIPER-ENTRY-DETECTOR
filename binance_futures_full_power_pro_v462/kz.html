<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SentinelSMC</title>
<style>
  body,html{margin:0;padding:0;height:100%;overflow:hidden;background:#000}
  #kz-bar{position:absolute;top:0;left:0;width:100%;height:35px;background:#7f1d1d;color:#f87171;z-index:100;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-size:13px;font-weight:bold;border-bottom:1px solid #dc2626;box-sizing:border-box}
  iframe.main-app{position:absolute;top:35px;left:0;width:100%;height:calc(100% - 35px);border:none}
  .action-btn{background:#000;padding:4px 8px;border-radius:4px;cursor:pointer;font-weight:bold;margin-left:10px;font-size:11px;border:1px solid;}
  #news-btn{color:#34d399;border-color:#059669;}
  #news-btn:hover{background:#064e3b;}
  #crypto-btn{color:#fbbf24;border-color:#d97706;}
  #crypto-btn:hover{background:#92400e;}
  .floating-panel{display:none;position:absolute;top:35px;right:10px;width:320px;height:400px;background:#131722;border:1px solid #434651;border-radius:0 0 8px 8px;z-index:999;box-shadow:0 10px 15px -3px rgba(0,0,0,0.5);overflow:hidden;}
  #btc-ticker{background:#111827;color:#fbbf24;border:1px solid #d97706;padding:4px 10px;border-radius:4px;font-weight:bold;margin-left:15px;font-size:12px;display:flex;align-items:center;}
</style>
</head>
<body>

<div id="kz-bar">
  <span id="kz-text">⏰ Memuat...</span>
  <div id="btc-ticker">₿ BTC: <span id="btc-price" style="margin-left:5px;">Memuat...</span></div>
  <button id="crypto-btn" class="action-btn" onclick="togglePanel('crypto-panel')">🔥 ALTCOIN PUMP RADAR</button>
  <button id="news-btn" class="action-btn" onclick="togglePanel('news-panel')">📰 MACRO NEWS</button>
</div>

<!-- Panel Berita Macro -->
<div id="news-panel" class="floating-panel">
  <div class="tradingview-widget-container">
    <div class="tradingview-widget-container__widget"></div>
    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
    {
      "colorTheme": "dark",
      "isTransparent": true,
      "width": "100%",
      "height": "100%",
      "locale": "id",
      "importanceFilter": "0,1",
      "currencyFilter": "USD"
    }
    </script>
  </div>
</div>

<!-- Panel Berita Altcoin (CryptoPanic) -->
<div id="crypto-panel" class="floating-panel" style="background:#000;">
  <div style="height:100%; width:100%; overflow-y:auto; overflow-x:hidden;">
    <a href="https://cryptopanic.com/" target="_blank" data-news_feed="trending" data-bg_color="#131722" data-text_color="#FFFFFF" data-link_color="#fbbf24" data-header_bg_color="#000000" data-header_text_color="#FFFFFF" class="CryptoPanicWidget">Trending Crypto News</a>
    <script src="https://static.cryptopanic.com/static/js/widgets.min.js"></script>
  </div>
</div>

<iframe class="main-app" src="index.html"></iframe>

<script>
  // Script Jam & Killzone
  setInterval(()=>{const d=new Date();const h=d.getHours();const m=d.getMinutes();const s=d.getSeconds();const timeStr=`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;let text=`⏰ WIB: ${timeStr} | `;let bg="#1e1b4b",border="#4338ca",color="#6366f1",status="💤 OUTSIDE ZONES";if(h>=14&&h<17){status="🇬🇧 LONDON ACTIVE ⚡";bg="#064e3b";border="#059669";color="#34d399"}else if(h>=19&&h<22){status="🇺🇸 NEW YORK ACTIVE 🔥";bg="#7f1d1d";border="#dc2626";color="#f87171"}const el=document.getElementById("kz-bar");const txtEl=document.getElementById("kz-text");if(el && txtEl){txtEl.innerHTML=text+status;el.style.backgroundColor=bg;el.style.borderColor=border;el.style.color=color}},1000);

  function togglePanel(panelId) {
    let p1 = document.getElementById('news-panel');
    let p2 = document.getElementById('crypto-panel');
    if (panelId === 'news-panel') {
      p1.style.display = (p1.style.display === 'block') ? 'none' : 'block';
      p2.style.display = 'none';
    } else {
      p2.style.display = (p2.style.display === 'block') ? 'none' : 'block';
      p1.style.display = 'none';
    }
  }

  let ws = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@ticker");
  let lastPrice = 0;
  ws.onmessage = (event) => {
    let data = JSON.parse(event.data);
    let price = parseFloat(data.c).toFixed(2);
    let priceEl = document.getElementById("btc-price");
    if(priceEl){
      priceEl.innerText = price;
      if(price > lastPrice){
        priceEl.style.color = "#34d399";
      } else if (price < lastPrice){
        priceEl.style.color = "#f87171";
      }
      lastPrice = price;
    }
  };
</script>
</body>
</html>
