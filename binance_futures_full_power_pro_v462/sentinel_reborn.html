<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root { --bg: #050505; --card: #111; --accent: #00ff9d; --text: #fff; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .metrics-bar { display: flex; gap: 20px; padding: 15px; background: #000; border-bottom: 1px solid #222; }
  .metric-card { background: #161616; padding: 10px 20px; border-radius: 8px; border: 1px solid #333; }
  .metric-value { color: var(--accent); font-size: 18px; font-weight: 700; }
  .metric-label { font-size: 10px; color: #777; text-transform: uppercase; }
  .main-layout { display: flex; flex: 1; overflow: hidden; }
  .sidebar { width: 300px; padding: 20px; background: #0a0a0a; border-right: 1px solid #222; overflow-y: auto; }
  .chart-container { flex: 1; background: #000; position: relative; }
  .radar-card { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid var(--accent); }
  .ticker-name { font-size: 16px; font-weight: 800; color: #fff; }
  .spike-meter { height: 4px; background: #333; margin: 10px 0; border-radius: 2px; }
  .spike-fill { height: 100%; background: var(--accent); width: 60%; }
</style>
</head>
<body>
<div class="metrics-bar">
  <div class="metric-card"><div class="metric-label">Market Status</div><div class="metric-value">BULLISH</div></div>
  <div class="metric-card"><div class="metric-label">Active Signals</div><div class="metric-value">04</div></div>
</div>
<div class="main-layout">
  <div class="sidebar">
    <div class="radar-card">
      <div class="ticker-name">BTC/USDT</div>
      <div class="spike-meter"><div class="spike-fill"></div></div>
      <div style="font-size: 12px; color: var(--accent);">Vol Spike: +2.45%</div>
    </div>
  </div>
  <div class="chart-container" id="tv_chart"></div>
</div>
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
  new TradingView.widget({
    "container_id": "tv_chart",
    "autosize": true,
    "symbol": "BINANCE:BTCUSDT.P",
    "theme": "dark",
    "style": "1",
    "interval": "15"
  });
</script>
</body>
</html>
