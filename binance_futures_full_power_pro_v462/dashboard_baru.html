<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binance Alpha Radar</title>
<style>
  :root { --bg: #0b0e14; --panel: #151a23; --accent: #eab308; --text: #e2e8f0; --green: #10b981; --red: #ef4444; }
  body,html{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x:hidden;}
  .navbar { background: var(--panel); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d3748; position: sticky; top: 0; z-index: 100;}
  .brand { font-size: 15px; font-weight: 800; color: var(--accent); display: flex; align-items: center; gap: 8px; letter-spacing: 1px; }
  .brand span { color: #fff; }
  .pulse-dot { width: 10px; height: 10px; background: var(--green); border-radius: 50%; box-shadow: 0 0 10px var(--green); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
  .container { display: flex; flex-direction: column; height: calc(100vh - 45px); }
  @media(min-width: 768px) { .container { flex-direction: row; } }
  .sidebar { background: var(--panel); padding: 15px; border-right: 1px solid #2d3748; display: flex; flex-direction: row; overflow-x: auto; gap: 15px; border-bottom: 1px solid #2d3748; scrollbar-width: none; }
  @media(min-width: 768px) { .sidebar { flex-direction: column; width: 250px; border-bottom: none; overflow-y: auto; } }
  .sidebar::-webkit-scrollbar { display: none; }
  .filter-section { min-width: max-content; }
  .filter-title { font-size: 11px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; font-weight: bold; }
  .chip { display: inline-flex; align-items: center; background: #1e293b; border: 1px solid #334155; padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.2s; margin-bottom:5px;}
  .chip input { display: none; }
  .chip.active { background: rgba(234, 179, 8, 0.1); border-color: var(--accent); color: var(--accent); }
  .main-content { flex: 1; padding: 15px; overflow-y: auto; background: radial-gradient(circle at top right, #151a23 0%, var(--bg) 100%); }
  .alert-card { background: rgba(21, 26, 35, 0.7); backdrop-filter: blur(10px); border: 1px solid #2d3748; border-left: 4px solid var(--green); padding: 16px; margin-bottom: 12px; border-radius: 8px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); }
  .alert-card.critical { border-left-color: var(--accent); }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .coin-tag { background: var(--accent); color: #000; padding: 3px 8px; border-radius: 4px; font-weight: 800; font-size: 12px; }
  .time-tag { font-size: 11px; color: #94a3b8; display: flex; align-items: center; gap: 4px; }
  .card-title { font-size: 14px; font-weight: 600; line-height: 1.4; margin-top: 8px; color: #fff; }
  .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; border-top: 1px solid #2d3748; padding-top: 10px; }
  .metric { font-size: 11px; color: #cbd5e1; }
  .metric span { font-weight: bold; color: var(--green); }
  .btn-action { background: transparent; border: 1px solid var(--green); color: var(--green); padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
  .btn-action:hover { background: var(--green); color: #000; }
  #status-text { font-size:12px; color:#94a3b8; text-align:center; margin-top:20px; font-style:italic;}
</style>
</head>
<body>

<div class="navbar">
  <div class="brand"><div class="pulse-dot"></div> BINANCE <span>ALPHA RADAR</span></div>
  <div style="font-size:12px; color:#94a3b8;" id="clock">00:00:00</div>
</div>

<div class="container">
  <div class="sidebar">
    <div class="filter-section">
      <div class="filter-title">🔗 Target Exchange</div>
      <label class="chip active"><input type="checkbox" checked> 🟡 Binance Live API</label>
    </div>
    <div class="filter-section">
      <div class="filter-title">⚡ Radar Triggers</div>
      <label class="chip active"><input type="checkbox" checked> Volume Spike (>0.05%)</label>
    </div>
  </div>

  <div class="main-content">
    <h3 style="margin-top:0; font-size:16px; color:#fff; border-bottom:1px solid #2d3748; padding-bottom:10px;">🔥 Live Action Feed</h3>
    <div id="feed-container">
       <div id="status-text">Menunggu sinyal anomali dari API Binance...</div>
    </div>
  </div>
</div>

<script>
  setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);
  
  async function fetchLiveAlerts() {
    try {
      const response = await fetch('http://localhost:8081/api/alerts');
      const json = await response.json();
      
      if(json.data && json.data.length > 0) {
        let html = '';
        json.data.forEach(alert => {
          let isCritical = alert.spike > 1 ? 'critical' : '';
          html += `
          <div class="alert-card ${isCritical}">
            <div class="card-header">
              <span class="coin-tag">${alert.symbol}</span>
              <span class="time-tag">⏱️ ${alert.time}</span>
            </div>
            <div class="card-title">Anomali Lonjakan Volume Terdeteksi!</div>
            <div class="card-footer">
              <div class="metric">Vol Spike: <span>+${alert.spike}%</span></div>
              <button class="btn-action">Eksekusi</button>
            </div>
          </div>
          `;
        });
        document.getElementById('feed-container').innerHTML = html;
      }
    } catch (e) {
      console.log("Koneksi ke mesin backend terputus.");
    }
  }

  // Tarik data baru dari Session 2 setiap 2 detik
  setInterval(fetchLiveAlerts, 2000);
</script>
</body>
</html>
